services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      TRANSFORMERS_CACHE: /app/.model_cache
    volumes:
      - model_cache:/app/.model_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  gateway:
    build:
      context: ./apps/gateway
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      AI_SERVICE_URL: http://api:8000
      PORT: "3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  model_cache:
