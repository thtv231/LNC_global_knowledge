# Production — dùng image từ GHCR (build bởi GitHub Actions)
# Local dev: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

x-ai-service: &ai-service
  image: ghcr.io/thtv231/lnc-ai-service:latest
  restart: unless-stopped
  env_file: .env
  environment:
    REDIS_URL: redis://redis:6379
  depends_on:
    redis:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 40s

services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service-1:
    <<: *ai-service

  ai-service-2:
    <<: *ai-service

  ai-lb:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      ai-service-1:
        condition: service_healthy
      ai-service-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  gateway:
    image: ghcr.io/thtv231/lnc-gateway:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      AI_SERVICE_URL: http://ai-lb:8000
      PORT: "3000"
    depends_on:
      ai-lb:
        condition: service_healthy

  web:
    image: ghcr.io/thtv231/lnc-web:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - gateway

volumes:
  redis_data:
