name: Build & Deploy to GCP VM

on:
  push:
    branches: [main]
  workflow_dispatch:        # cho phép trigger thủ công từ GitHub UI

env:
  REGISTRY: ghcr.io
  OWNER: thtv231            # GitHub username (lowercase)

jobs:
  # ── Build 3 images song song ─────────────────────────────────────────────────
  build-ai-service:
    name: Build ai-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./apps/ai-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-ai-service:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-ai-service:${{ github.sha }}
          cache-from: type=gha,scope=ai-service
          cache-to:   type=gha,mode=max,scope=ai-service

  build-gateway:
    name: Build gateway
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./apps/gateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-gateway:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-gateway:${{ github.sha }}
          cache-from: type=gha,scope=gateway
          cache-to:   type=gha,mode=max,scope=gateway

  build-web:
    name: Build web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-web:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-web:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha,scope=web
          cache-to:   type=gha,mode=max,scope=web

  # ── Deploy khi cả 3 build xong ───────────────────────────────────────────────
  deploy:
    name: Deploy to GCP VM
    needs: [build-ai-service, build-gateway, build-web]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Ghi .env lên VM từ GitHub Secrets, sau đó pull image và restart
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Truyền secrets qua env để tránh injection khi ghi vào shell
          NEO4J_URI:             ${{ secrets.NEO4J_URI }}
          NEO4J_PASSWORD:        ${{ secrets.NEO4J_PASSWORD }}
          DEEPSEEK_API_KEY:      ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_KEYS:     ${{ secrets.DEEPSEEK_API_KEYS }}
          TAVILY_API_KEY:        ${{ secrets.TAVILY_API_KEY }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          GOOGLE_SHEET_WEBHOOK:  ${{ secrets.GOOGLE_SHEET_WEBHOOK }}
          GHCR_PAT:              ${{ secrets.GHCR_PAT }}
        with:
          host:     ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key:      ${{ secrets.GCP_VM_SSH_KEY }}
          envs: NEO4J_URI,NEO4J_PASSWORD,DEEPSEEK_API_KEY,DEEPSEEK_API_KEYS,TAVILY_API_KEY,GROQ_API_KEY,GOOGLE_SHEET_WEBHOOK,GHCR_PAT
          script: |
            set -e
            mkdir -p /opt/lnc-app
            cd /opt/lnc-app

            # ── Ghi .env an toàn qua env vars (tránh shell injection) ──────────
            {
              echo "NEO4J_URI=${NEO4J_URI}"
              echo "NEO4J_USER=neo4j"
              echo "NEO4J_PASSWORD=${NEO4J_PASSWORD}"
              echo "DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}"
              echo "DEEPSEEK_API_KEYS=${DEEPSEEK_API_KEYS}"
              echo "DEEPSEEK_BASE_URL=https://api.deepseek.com"
              echo "DEEPSEEK_MODEL=deepseek-chat"
              echo "GROQ_API_KEY=${GROQ_API_KEY}"
              echo "TAVILY_API_KEY=${TAVILY_API_KEY}"
              echo "GOOGLE_SHEET_WEBHOOK=${GOOGLE_SHEET_WEBHOOK}"
              echo "REDIS_URL=redis://redis:6379"
              echo "AI_SERVICE_URL=http://ai-service:8000"
              echo "PORT=3000"
            } > .env

            # ── Cập nhật docker-compose.yml từ repo ──────────────────────────
            curl -fsSL \
              "https://raw.githubusercontent.com/thtv231/LNC_global_knowledge/main/docker-compose.yml" \
              -o docker-compose.yml

            # ── Pull images mới từ GHCR ───────────────────────────────────────
            echo "${GHCR_PAT}" | docker login ghcr.io -u thtv231 --password-stdin
            docker compose pull

            # ── Rolling restart ───────────────────────────────────────────────
            docker compose up -d --remove-orphans

            # ── Cleanup image cũ ──────────────────────────────────────────────
            docker image prune -f

            echo "✓ Deployed ${{ github.sha }} lúc $(date '+%Y-%m-%d %H:%M:%S UTC')"
