name: Build & Deploy to GCP VM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: thtv231
  VM_NAME: instance-20260619-023955
  VM_ZONE: us-central1-a

jobs:
  build-ai-service:
    name: Build ai-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/ai-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-ai-service:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-ai-service:${{ github.sha }}
          cache-from: type=gha,scope=ai-service
          cache-to:   type=gha,mode=max,scope=ai-service

  build-gateway:
    name: Build gateway
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/gateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-gateway:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-gateway:${{ github.sha }}
          cache-from: type=gha,scope=gateway
          cache-to:   type=gha,mode=max,scope=gateway

  build-web:
    name: Build web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-web:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-web:${{ github.sha }}
          build-args: VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha,scope=web
          cache-to:   type=gha,mode=max,scope=web

  deploy:
    name: Deploy to VM
    needs: [build-ai-service, build-gateway, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Write env file locally
        env:
          NEO4J_URI:            ${{ secrets.NEO4J_URI }}
          NEO4J_PASSWORD:       ${{ secrets.NEO4J_PASSWORD }}
          DEEPSEEK_API_KEY:     ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_KEYS:    ${{ secrets.DEEPSEEK_API_KEYS }}
          TAVILY_API_KEY:       ${{ secrets.TAVILY_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GOOGLE_SHEET_WEBHOOK: ${{ secrets.GOOGLE_SHEET_WEBHOOK }}
          GHCR_PAT:             ${{ secrets.GHCR_PAT }}
          GITHUB_TOKEN_VAL:     ${{ secrets.GITHUB_TOKEN }}
          GIT_ACTOR:            ${{ github.actor }}
        run: |
          cat > /tmp/lnc.env << EOF
          NEO4J_URI=${NEO4J_URI}
          NEO4J_USER=neo4j
          NEO4J_PASSWORD=${NEO4J_PASSWORD}
          DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
          DEEPSEEK_API_KEYS=${DEEPSEEK_API_KEYS}
          DEEPSEEK_BASE_URL=https://api.deepseek.com
          DEEPSEEK_MODEL=deepseek-chat
          GROQ_API_KEY=${GROQ_API_KEY}
          TAVILY_API_KEY=${TAVILY_API_KEY}
          GOOGLE_SHEET_WEBHOOK=${GOOGLE_SHEET_WEBHOOK}
          REDIS_URL=redis://redis:6379
          AI_SERVICE_URL=http://ai-service:8000
          PORT=3000
          EOF

          # Use GHCR_PAT if set, otherwise fall back to GITHUB_TOKEN
          PULL_TOKEN="${GHCR_PAT:-${GITHUB_TOKEN_VAL}}"
          printf '%s' "${PULL_TOKEN}" > /tmp/lnc_ghcr_token
          printf '%s' "${GIT_ACTOR}"  > /tmp/lnc_ghcr_user

      - name: Upload files to VM
        run: |
          gcloud compute scp /tmp/lnc.env /tmp/lnc_ghcr_token /tmp/lnc_ghcr_user \
            ${{ env.VM_NAME }}:/tmp/ \
            --zone=${{ env.VM_ZONE }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      - name: Bootstrap & Deploy
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.VM_ZONE }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --quiet \
            --command='
              set -e

              # ── Install Docker (idempotent) ───────────────────────────────────
              if ! command -v docker &>/dev/null; then
                echo "==> Installing Docker..."
                curl -fsSL https://get.docker.com | sudo sh
              fi
              sudo usermod -aG docker "$USER" 2>/dev/null || true
              sudo mkdir -p /opt/lnc-app
              sudo chmod 777 /opt/lnc-app

              # ── Deploy ────────────────────────────────────────────────────────
              # Copy .env (use sudo to avoid permission issues)
              sudo cp /tmp/lnc.env /opt/lnc-app/.env
              sudo chmod 600 /opt/lnc-app/.env

              # Get latest docker-compose.yml
              sudo curl -fsSL \
                https://raw.githubusercontent.com/thtv231/LNC_global_knowledge/main/docker-compose.yml \
                -o /opt/lnc-app/docker-compose.yml

              # Login to GHCR
              PULL_TOKEN=$(cat /tmp/lnc_ghcr_token)
              PULL_USER=$(cat /tmp/lnc_ghcr_user)
              echo "$PULL_TOKEN" | sudo docker login ghcr.io -u "$PULL_USER" --password-stdin

              # Pull & restart
              cd /opt/lnc-app
              sudo docker compose pull
              sudo docker compose up -d --remove-orphans
              sudo docker image prune -f

              # Cleanup temp files
              sudo rm -f /tmp/lnc.env /tmp/lnc_ghcr_token /tmp/lnc_ghcr_user

              echo ""
              echo "=== Deployed successfully ==="
              sudo docker compose ps
            '
