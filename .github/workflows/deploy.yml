name: Build & Deploy to GCP VM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: thtv231
  VM_NAME: instance-20260619-023955
  VM_ZONE: us-central1-a
  VM_USER: vulncglobal
  VM_IP: 35.239.231.145
  APP_DIR: /opt/lnc-app

jobs:
  # ── Build 3 images song song ─────────────────────────────────────────────────
  build-ai-service:
    name: Build ai-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/ai-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-ai-service:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-ai-service:${{ github.sha }}
          cache-from: type=gha,scope=ai-service
          cache-to:   type=gha,mode=max,scope=ai-service

  build-gateway:
    name: Build gateway
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/gateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-gateway:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-gateway:${{ github.sha }}
          cache-from: type=gha,scope=gateway
          cache-to:   type=gha,mode=max,scope=gateway

  build-web:
    name: Build web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-web:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lnc-web:${{ github.sha }}
          build-args: VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha,scope=web
          cache-to:   type=gha,mode=max,scope=web

  # ── Bootstrap VM: cài Docker + cấp quyền cho vulncglobal ────────────────────
  bootstrap:
    name: Bootstrap VM
    needs: [build-ai-service, build-gateway, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install Docker & setup vulncglobal
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.VM_ZONE }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --quiet \
            --command='
              set -e

              # Cài Docker nếu chưa có
              if ! command -v docker &>/dev/null; then
                echo "Installing Docker..."
                curl -fsSL https://get.docker.com | sudo sh
              fi

              # Cấp quyền docker + sudo cho vulncglobal (idempotent)
              sudo usermod -aG docker vulncglobal 2>/dev/null || true
              sudo bash -c "echo \"vulncglobal ALL=(ALL) NOPASSWD:ALL\" > /etc/sudoers.d/vulncglobal"

              # Tạo thư mục app
              sudo mkdir -p /opt/lnc-app
              sudo chown vulncglobal:vulncglobal /opt/lnc-app

              echo "Bootstrap OK — Docker: $(docker --version)"
            '

  # ── Deploy: ghi .env + pull images + restart ─────────────────────────────────
  deploy:
    name: Deploy
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write .env & deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          NEO4J_URI:            ${{ secrets.NEO4J_URI }}
          NEO4J_PASSWORD:       ${{ secrets.NEO4J_PASSWORD }}
          DEEPSEEK_API_KEY:     ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_KEYS:    ${{ secrets.DEEPSEEK_API_KEYS }}
          TAVILY_API_KEY:       ${{ secrets.TAVILY_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GOOGLE_SHEET_WEBHOOK: ${{ secrets.GOOGLE_SHEET_WEBHOOK }}
          GHCR_PAT:             ${{ secrets.GHCR_PAT }}
        with:
          host:     ${{ env.VM_IP }}
          username: ${{ env.VM_USER }}
          key:      ${{ secrets.GCP_VM_SSH_KEY }}
          envs: NEO4J_URI,NEO4J_PASSWORD,DEEPSEEK_API_KEY,DEEPSEEK_API_KEYS,TAVILY_API_KEY,GROQ_API_KEY,GOOGLE_SHEET_WEBHOOK,GHCR_PAT
          script: |
            set -e
            cd /opt/lnc-app

            # Ghi .env an toàn qua env vars
            {
              echo "NEO4J_URI=${NEO4J_URI}"
              echo "NEO4J_USER=neo4j"
              echo "NEO4J_PASSWORD=${NEO4J_PASSWORD}"
              echo "DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}"
              echo "DEEPSEEK_API_KEYS=${DEEPSEEK_API_KEYS}"
              echo "DEEPSEEK_BASE_URL=https://api.deepseek.com"
              echo "DEEPSEEK_MODEL=deepseek-chat"
              echo "GROQ_API_KEY=${GROQ_API_KEY}"
              echo "TAVILY_API_KEY=${TAVILY_API_KEY}"
              echo "GOOGLE_SHEET_WEBHOOK=${GOOGLE_SHEET_WEBHOOK}"
              echo "REDIS_URL=redis://redis:6379"
              echo "AI_SERVICE_URL=http://ai-service:8000"
              echo "PORT=3000"
            } > .env

            # Lấy docker-compose.yml mới nhất
            curl -fsSL \
              "https://raw.githubusercontent.com/thtv231/LNC_global_knowledge/main/docker-compose.yml" \
              -o docker-compose.yml

            # Pull images từ GHCR
            echo "${GHCR_PAT}" | docker login ghcr.io -u thtv231 --password-stdin
            docker compose pull

            # Rolling restart
            docker compose up -d --remove-orphans
            docker image prune -f

            echo "✓ Deployed ${{ github.sha }} — $(date '+%Y-%m-%d %H:%M UTC')"
            docker compose ps
