name: Import crawled data → Neo4j + embed

on:
  workflow_run:
    workflows: ["Crawl daily (Reddit + RSS)"]
    types: [completed]
  workflow_dispatch:
    inputs:
      data_dir:
        description: "Subdir to import (e.g. reddit, cicnews, or 'all')"
        default: "all"

jobs:
  import:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import new JSON files
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: |
          DATA_DIR="${{ github.event.inputs.data_dir || 'all' }}"
          if [ "$DATA_DIR" = "all" ]; then
            for subdir in data/crawled/*/; do
              [ -d "$subdir" ] || continue
              name=$(basename "$subdir")
              if [ "$name" = "wegreened_cases" ]; then
                echo "Skipping $subdir (structured analytics records, not KnowledgeChunk-shaped)"
                continue
              fi
              echo "Importing $subdir..."
              python -m graph.importers.json_importer --data-dir "$subdir" --recursive
            done
          else
            python -m graph.importers.json_importer --data-dir "data/crawled/$DATA_DIR" --recursive
          fi

      - name: Generate embeddings for new chunks
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: python -m embeddings.embed_nodes --label KnowledgeChunk --batch-size 32

      - name: Summary report
        if: always()
        run: |
          echo "## Import Summary" >> $GITHUB_STEP_SUMMARY
          echo "Import completed for: ${{ github.event.inputs.data_dir || 'all' }}" >> $GITHUB_STEP_SUMMARY
